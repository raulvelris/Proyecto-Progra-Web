<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <!-- Columna de Enlaces -->
        <div class="w-64 bg-blue-50 p-4 min-h-screen">
            <div class="flex items-center space-x-4 mb-6">
                <img src="" alt="Avatar" class="rounded-full w-12 h-12">
                <div>
                    <h2 class="text-lg font-semibold">Usuario</h2>
                </div>
            </div>
            <nav class="space-y-4">
                <a href="#" class="flex items-center space-x-2 text-gray-700 hover:text-blue-500">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a2 2 0 002 2h10a2 2 0 002-2V10m-5 6h.01"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="gastosExportados.html" class="flex items-center space-x-2 text-gray-700 hover:text-blue-500">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    <span>Gastos</span>
                </a>
                <a href="presupuesto.html" class="flex items-center space-x-2 text-gray-700 hover:text-blue-500">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span>Presupuestos</span>
                </a>
                <a href="perfilConfiguracion.html" class="flex items-center space-x-2 text-gray-700 hover:text-blue-500">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                    <span>Configuración</span>
                </a>
                <a href="#" class="flex items-center space-x-2 text-gray-700 hover:text-blue-500">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 9v6m4-6v6m-9 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    <span>Salir</span>
                </a>
            </nav>
        </div>

        <div class="flex-1 p-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold">Mis Presupuestos</h1>
                <button id="add-button" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Agregar</button>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-blue-500 text-white">
                        <th class="p-2">Categoria</th>
                        <th class="p-2">Monto</th>
                        <th class="p-2">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b">
                        <td class="p-2">Ocio</td>
                        <td class="p-2">S/. 129.99</td>
                        <td class="p-2 flex space-x-2">
                            <button class="text-blue-500 hover:underline">✏️</button>
                            <button class="text-red-500 hover:underline">🗑️</button>
                        </td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-2">Servicios</td>
                        <td class="p-2">S/. 1229.99</td>
                        <td class="p-2 flex space-x-2">
                            <button class="text-blue-500 hover:underline">✏️</button>
                            <button class="text-red-500 hover:underline">🗑️</button>
                        </td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-2">Ocio</td>
                        <td class="p-2">S/. 799.99</td>
                        <td class="p-2 flex space-x-2">
                            <button class="text-blue-500 hover:underline">✏️</button>
                            <button class="text-red-500 hover:underline">🗑️</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    <!-- Boton Agregar Presupuesto -->
    <div id="add-modal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-96">
            <h2 class="text-xl font-semibold mb-4">Agregar Presupuesto</h2>
            <form id="add-form" class="space-y-4">
                <div>
                    <label for="category" class="block text-gray-700">Categoría</label>
                    <select id="category" class="w-full p-2 border rounded">
                        <option value="">Selecciona una categoría</option>
                        <option value="Servicios">Servicios</option>
                        <option value="Ocio">Ocio</option>
                        <option value="Alimentación">Alimentación</option>
                    </select>
                </div>
                <div>
                    <label for="amount" class="block text-gray-700">Monto</label>
                    <input type="number" id="amount" class="w-full p-2 border rounded" placeholder="Ingrese el monto" min="0">
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancel-add-button" class="bg-gray-500 text-white py-2 px-4 rounded hover:bg-gray-600">Cancelar</button>
                    <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script que debe ir en el backend y en typescript -->
    <script>
        const addButton = document.getElementById('add-button');
        const addModal = document.getElementById('add-modal');
        const cancelAddButton = document.getElementById('cancel-add-button');

        const categoryInput = document.getElementById('category');
        const amountInput = document.getElementById('amount');

        addButton.addEventListener('click', () => {
            addModal.classList.remove('hidden');
        });

        cancelAddButton.addEventListener('click', () => {
            addModal.classList.add('hidden');
            categoryInput.value = '';
            amountInput.value = '';
        });

        document.getElementById('add-form').addEventListener('submit', (event) => {
            event.preventDefault();

            if (!categoryInput.value.trim() || !amountInput.value.trim()) {
                alert('Debe seleccionar una categoría y proporcionar un monto válido.');
                return;
            }

            alert(`Presupuesto agregado:\nCategoría: ${categoryInput.value}\nMonto: S/ ${amountInput.value}`);

            addModal.classList.add('hidden');
            categoryInput.value = '';
            amountInput.value = '';
        });
    </script>
    </body>
</html>
